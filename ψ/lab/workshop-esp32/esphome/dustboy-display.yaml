esphome:
  name: gon-dustboy-display
  friendly_name: "Gon DustBoy PM2.5"
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Gon-DustBoy"
    password: "firstcomesrock"

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome

uart:
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 9600

sensor:
  - platform: pmsx003
    type: PMSX003
    pm_1_0:
      name: "PM1.0"
    pm_2_5:
      name: "PM2.5"
      id: pm25_sensor
      on_value:
        then:
          - lvgl.indicator.update:
              id: pm25_needle
              value: !lambda "return x;"
          - lvgl.label.update:
              id: pm25_value_label
              text: !lambda |-
                char buf[16];
                snprintf(buf, sizeof(buf), "%.0f", x);
                return std::string(buf);
    pm_10_0:
      name: "PM10"

  - platform: dht
    pin: GPIO4
    model: DHT22
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: humidity_sensor
    update_interval: 30s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

time:
  - platform: sntp
    id: sntp_time
    timezone: "Asia/Bangkok"

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

display:
  - platform: ili9xxx
    model: ILI9341
    cs_pin: GPIO5
    dc_pin: GPIO2
    reset_pin: GPIO15
    dimensions:
      width: 320
      height: 240
    auto_clear_enabled: true

  - platform: lvgl
    dimensions:
      width: 320
      height: 240
    pages:
      - id: main_page
        widgets:
          - label:
              text: "🪨 Gon DustBoy"
              align: TOP_MID
              text_font: montserrat_16

          - meter:
              align: CENTER
              width: 180
              height: 180
              scales:
                - range_from: 0
                  range_to: 200
                  angle_range: 270
                  ticks:
                    count: 21
                    width: 2
                    length: 10
                  indicators:
                    - line:
                        id: pm25_needle
                        width: 3
                        color: 0xFF0000
                        r_mod: -10

          - label:
              id: pm25_value_label
              text: "--"
              align: CENTER
              y: 40
              text_font: montserrat_28

          - label:
              text: "µg/m³"
              align: CENTER
              y: 70
              text_font: montserrat_14
